# Window decorations
hide_window_decorations yes
enable_audio_bell no
confirm_os_window_close 0

# Window padding
window_padding_width 8

# Window management
map cmd+ctrl+m toggle_maximized

# Terminal integration
shell_integration enabled

# SSH key forwarding
term xterm-256color

# macOS Option key handling
macos_option_as_alt yes

# cursor
cursor_blink_interval 0
cursor_shape block

# mouse
mouse_hide_wait 10.0

# theme
include theme.conf

# layouts (splits for panes, stack for zoom)
enabled_layouts splits,stack

# Shift+Enter sends newline (fix for Claude Code)
map shift+enter send_key ctrl+j

# Reset terminal state (fixes stuck kitty keyboard protocol after dev-containers)
# Cmd+Shift+R — quick fix when ctrl+c/ctrl+d stop working
map cmd+shift+r clear_terminal reset active

# Fix paste in SSH + tmux (bypass bracketed paste issues)
paste_actions quote-urls-at-prompt,confirm-if-large

# help overlay
map cmd+shift+/ launch --type=overlay bash ~/.config/kitty/show_help.sh

# tmux replacement - tabs
include tabs.conf